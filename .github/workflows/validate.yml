name: Validar

on:
  push:
    branches:
      - main
      - "CK/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp/ibmi-local/package-lock.json

      - name: Instalar dependencias
        working-directory: mcp/ibmi-local
        run: npm ci --no-audit --no-fund

      - name: Probar servidor y customizaciones
        working-directory: mcp/ibmi-local
        run: npm test

      - name: Verificar tipos
        working-directory: mcp/ibmi-local
        run: npm run typecheck

      - name: Compilar servidor
        working-directory: mcp/ibmi-local
        run: npm run build

      - name: Validar agentes, prompts y skills
        run: node scripts/validate-customizations.mjs

      - name: Validar privacidad del contenido publico
        env:
          PUBLIC_CONTENT_DENYLIST: ${{ secrets.PUBLIC_CONTENT_DENYLIST }}
        run: node scripts/validate-public-content.mjs

      - name: Validar sintaxis PowerShell
        shell: pwsh
        run: |
          $fallos = @()
          Get-ChildItem -LiteralPath scripts -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) { $fallos += $errors }
          }
          if ($fallos.Count -gt 0) {
            $fallos | Format-List
            throw "Se detectaron $($fallos.Count) errores de sintaxis PowerShell."
          }

      - name: Probar asistente ODBC con inventarios simulados
        shell: pwsh
        run: ./scripts/Test-IbmiOdbcPrerequisite.Unit.ps1

      - name: Construir los dos paquetes
        shell: pwsh
        run: ./scripts/Build-ReleasePackages.ps1
